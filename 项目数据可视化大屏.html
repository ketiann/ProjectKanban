<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目数据可视化大屏</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e27;color:#e0e6f0;font-family:'Microsoft YaHei','PingFang SC',sans-serif;overflow-x:hidden}
.dashboard{width:100%;min-height:100vh;padding:16px 20px}
.header{text-align:center;padding:10px 0 18px;position:relative}
.header h1{font-size:28px;background:linear-gradient(90deg,#00d4ff,#7b61ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:6px;font-weight:700}
.header .sub{color:#5a6a8a;font-size:13px;margin-top:4px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px 20px;margin-bottom:16px}
.kpi-card{background:linear-gradient(135deg,rgba(20,30,60,0.9),rgba(10,14,39,0.95));border:1px solid rgba(0,212,255,0.15);border-radius:10px;padding:16px 20px;position:relative;overflow:hidden;min-width:0}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.kpi-card .label{font-size:12px;color:#7a8ba8;margin-bottom:6px}
.kpi-card .value{font-size:24px;font-weight:700;color:#fff;white-space:nowrap}
.kpi-card .value .unit{font-size:12px;color:#7a8ba8;font-weight:400;margin-left:3px}
.kpi-card .sub-info{font-size:11px;color:#7a8ba8;margin-top:4px}
.kpi-card:nth-child(1){--accent:#00d4ff}
.kpi-card:nth-child(2){--accent:#7b61ff}
.kpi-card:nth-child(3){--accent:#00e396}
.kpi-card:nth-child(4){--accent:#4ecdc4}
.grid{display:grid;gap:14px;margin-bottom:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.panel{background:linear-gradient(135deg,rgba(20,30,60,0.85),rgba(10,14,39,0.9));border:1px solid rgba(0,212,255,0.1);border-radius:10px;padding:16px;position:relative}
.panel-title{font-size:14px;font-weight:600;color:#00d4ff;margin-bottom:12px;padding-left:10px;border-left:3px solid #00d4ff;display:flex;align-items:center;gap:6px}
.panel-title .dot{width:6px;height:6px;border-radius:50%;background:#00d4ff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chart-box{width:100%;height:280px}
.chart-box-sm{width:100%;height:240px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:rgba(0,212,255,0.08);color:#7ab8e0;padding:8px 6px;text-align:left;font-weight:600;white-space:nowrap;border-bottom:1px solid rgba(0,212,255,0.15)}
tbody td{padding:7px 6px;border-bottom:1px solid rgba(255,255,255,0.04);color:#c0c8d8;white-space:nowrap}
tbody tr:hover{background:rgba(0,212,255,0.05)}
.progress-bar{display:inline-block;height:6px;border-radius:3px;background:rgba(255,255,255,0.08);width:60px;vertical-align:middle;margin-left:4px}
.progress-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#00d4ff,#7b61ff)}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px}
.tag-green{background:rgba(0,227,150,0.15);color:#00e396}
.tag-blue{background:rgba(0,212,255,0.15);color:#00d4ff}
.tag-orange{background:rgba(255,179,71,0.15);color:#ffb347}
.tag-red{background:rgba(255,107,107,0.15);color:#ff6b6b}
.tag-purple{background:rgba(123,97,255,0.15);color:#7b61ff}
.scroll-table{max-height:310px;overflow-y:auto}
.scroll-table::-webkit-scrollbar{width:4px}
.scroll-table::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}
.labor-summary{display:flex;gap:20px;justify-content:center;align-items:center;margin-bottom:12px}
.labor-stat{text-align:center}
.labor-stat .num{font-size:32px;font-weight:700}
.labor-stat .num.green{color:#00e396}
.labor-stat .num.orange{color:#ffb347}
.labor-stat .lbl{font-size:12px;color:#7a8ba8;margin-top:2px}
.labor-divider{width:1px;height:50px;background:rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <h1>项 目 数 据 可 视 化 大 屏</h1>
    <div class="sub">数据统计周期：2026年3月 ｜ 项目总数：<span id="totalBadge">96</span></div>
  </div>

  <!-- KPI: 4 cards -->
  <div class="kpi-row">
    <div class="kpi-card"><div class="label">项目总数</div><div class="value" id="kpi1">-</div></div>
    <div class="kpi-card"><div class="label">合同金额合计</div><div class="value" id="kpi2">-</div></div>
    <div class="kpi-card"><div class="label">已回款金额</div><div class="value" id="kpi3">-</div></div>
    <div class="kpi-card"><div class="label">预估实施成本</div><div class="value" id="kpi4">-</div><div class="sub-info" id="kpi4_sub"></div></div>
  </div>

  <!-- Row 1: 本月人力投入情况 (NEW) + 合同类型分布 + 项目类型分布 -->
  <div class="grid grid-3">
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>本月人力投入情况</div>
      <div id="labor_summary_area"></div>
      <div class="chart-box-sm" id="chart_month_labor"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>合同类型分布</div>
      <div class="chart-box" id="chart_contract_type"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>项目类型分布</div>
      <div class="chart-box" id="chart_ptype"></div>
    </div>
  </div>

  <!-- Row 2: 回款率分布 + 项目进度分布(排除0) + 本月部门人力投入(NEW) -->
  <div class="grid grid-3">
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>回款率分布</div>
      <div class="chart-box" id="chart_pay_dist"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>项目进度分布</div>
      <div class="chart-box" id="chart_progress_dist"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>本月部门人力投入</div>
      <div class="chart-box" id="chart_month_dept"></div>
    </div>
  </div>

  <!-- Row 3: TOP10表格 + 人力投入累计TOP10 -->
  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>合同金额TOP10项目</div>
      <div class="scroll-table" id="table_top10"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>人力投入累计TOP10项目</div>
      <div class="scroll-table" id="table_top_labor"></div>
    </div>
  </div>

  <!-- Row 4: 挂起项目 -->
  <div class="grid grid-1" style="grid-template-columns:1fr">
    <div class="panel">
      <div class="panel-title"><span class="dot"></span>挂起项目</div>
      <div class="scroll-table" id="table_suspended"></div>
    </div>
  </div>
</div>

function initPie(id, data, rose=false) {
  const ch = echarts.init(document.getElementById(id));
  ch.setOption({
    tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)',backgroundColor:'rgba(10,14,39,0.9)',borderColor:'rgba(0,212,255,0.3)',textStyle:{color:'#e0e6f0'}},
    color: COLORS,
    legend:{type:'scroll',bottom:0,textStyle:{color:'#a0aec0',fontSize:10},pageTextStyle:{color:'#a0aec0'}},
    series:[{
      type:'pie', radius: rose ? ['25%','65%'] : ['35%','65%'],
      center:['50%','48%'], roseType: rose ? 'area' : false,
      label:{color:'#a0aec0',fontSize:11,formatter:'{b}\n{d}%'},
      labelLine:{lineStyle:{color:'rgba(255,255,255,0.2)'}},
      itemStyle:{borderColor:'#0a0e27',borderWidth:2,borderRadius:6},
      emphasis:{itemStyle:{shadowBlur:15,shadowColor:'rgba(0,212,255,0.4)'},label:{fontSize:13,fontWeight:'bold'}},
      data: data.map(d=>({name:d.name,value:d.value}))
    }]
  });
  window.addEventListener('resize',()=>ch.resize());
}

function initBarH(id, names, values) {
  const ch = echarts.init(document.getElementById(id));
  ch.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'rgba(10,14,39,0.9)',borderColor:'rgba(0,212,255,0.3)',textStyle:{color:'#e0e6f0'}},
    grid:{left:110,right:40,top:10,bottom:20},
    xAxis:{type:'value',axisLabel:{color:'#7a8ba8',fontSize:10,formatter:v=>fmt(v)},splitLine:{lineStyle:{color:'rgba(255,255,255,0.04)'}},axisLine:{show:false}},
    yAxis:{type:'category',data:names.reverse(),axisLabel:{color:'#a0aec0',fontSize:10},axisLine:{lineStyle:{color:'rgba(255,255,255,0.08)'}},axisTick:{show:false}},
    series:[{type:'bar',data:values.reverse(),barWidth:14,
      itemStyle:{borderRadius:[0,4,4,0],color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#7b61ff'},{offset:1,color:'#00d4ff'}])},
      label:{show:true,position:'right',color:'#a0aec0',fontSize:10,formatter:p=>fmt(p.value)},
      emphasis:{itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#9b81ff'},{offset:1,color:'#40e0ff'}])}}
    }]
  });
  window.addEventListener('resize',()=>ch.resize());
}

function initBarV(id, names, values) {

    grid:{left:50,right:20,top:20,bottom:40},
    xAxis:{type:'category',data:names,axisLabel:{color:'#a0aec0',fontSize:10,rotate:names.length>6?25:0},axisLine:{lineStyle:{color:'rgba(255,255,255,0.08)'}},axisTick:{show:false}},
    yAxis:{type:'value',axisLabel:{color:'#7a8ba8',fontSize:10},splitLine:{lineStyle:{color:'rgba(255,255,255,0.04)'}},axisLine:{show:false}},
    series:[{type:'bar',data:values,barWidth:names.length>8?16:24,

      label:{show:true,position:'top',color:'#a0aec0',fontSize:10}
    }]
  });
  window.addEventListener('resize',()=>ch.resize());
}
